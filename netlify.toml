[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://checkout.stripe.com https://www.paypal.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.paypal.com https://www.paypalobjects.com https://js.stripe.com https://accounts.google.com; connect-src 'self' https://api.tsunamiapp.medianinjas.tv wss://api.tsunamiapp.medianinjas.tv https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://checkout.stripe.com https://www.paypal.com https://api-m.paypal.com https://www.googleapis.com https://oauth2.googleapis.com https://api.dropboxapi.com https://content.dropboxapi.com https://www.dropbox.com; frame-src https://js.stripe.com https://checkout.stripe.com https://www.paypal.com https://www.sandbox.paypal.com https://accounts.google.com;"
